<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1123 794" font-family="-apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>
    <!-- 金色边框渐变 -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f5d76e"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <!-- 等级徽章渐变 -->
    <radialGradient id="badgeGrad">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.8"/>
    </radialGradient>
    <!-- 印章渐变 -->
    <radialGradient id="sealGrad">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
    <!-- 水印图案 -->
    <pattern id="watermark" x="0" y="0" width="180" height="180" patternUnits="userSpaceOnUse">
      <text x="90" y="100" text-anchor="middle" font-size="40" fill="#000" opacity="0.025" transform="rotate(-30 90 90)" font-weight="bold">PDTMM</text>
    </pattern>
    <!-- 阴影 -->
    <filter id="shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="2"/><feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- 背景 -->
  <rect width="1123" height="794" fill="url(#bgGrad)"/>
  <rect width="1123" height="794" fill="url(#watermark)"/>

  <!-- 外金边 -->
  <rect x="30" y="30" width="1063" height="734" fill="none" stroke="url(#borderGrad)" stroke-width="4"/>
  <rect x="42" y="42" width="1039" height="710" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- 装饰角 -->
  <g stroke="#34d399" stroke-width="2" fill="none">
    <path d="M 60 60 L 90 60 M 60 60 L 60 90"/>
    <path d="M 1063 60 L 1033 60 M 1063 60 L 1063 90"/>
    <path d="M 60 734 L 90 734 M 60 734 L 60 704"/>
    <path d="M 1063 734 L 1033 734 M 1063 734 L 1063 704"/>
  </g>

  <!-- 顶部 LOGO 区 -->
  <g transform="translate(561.5, 110)">
    <text text-anchor="middle" font-size="14" fill="#666" letter-spacing="3" font-weight="600">PARK-ROADS · OPENFLOWONE.HK</text>
    <text y="34" text-anchor="middle" font-size="20" fill="#222" font-weight="bold" letter-spacing="6">PDTMM 1.0 CERTIFICATION</text>
  </g>

  <!-- 主标题 -->
  <g transform="translate(561.5, 200)">
    <text text-anchor="middle" font-size="42" fill="#1a2845" font-weight="bold">产业园区数字化转型成熟度认证证书</text>
    <text y="34" text-anchor="middle" font-size="16" fill="#666">Park Digital Transformation Maturity Model · Certification</text>
  </g>

  <!-- 等级徽章 -->
  <g transform="translate(180, 360)" filter="url(#shadow)">
    <circle r="80" fill="url(#badgeGrad)"/>
    <circle r="72" fill="none" stroke="#fff" stroke-width="2"/>
    <text text-anchor="middle" y="-10" font-size="42" fill="#fff" font-weight="bold">L3</text>
    <text text-anchor="middle" y="25" font-size="16" fill="#fff">良好级</text>
    <text text-anchor="middle" y="50" font-size="12" fill="#fff" opacity="0.85">DTSI 50-60</text>
  </g>

  <!-- 证书主文 -->
  <g transform="translate(310, 310)">
    <text font-size="16" fill="#444">兹证明</text>
    <text y="42" font-size="32" fill="#1a2845" font-weight="bold">{{RECIPIENT_NAME}}</text>
    <text y="62" font-size="11" fill="#888">（产业园区名称占位符 · 颁证时填入）</text>

    <text y="105" font-size="14" fill="#333" lengthAdjust="spacing">经 Park-ROADS 团队依据 PDTMM 1.0 标准对该园区进行</text>
    <text y="128" font-size="14" fill="#333">DTSI 7 主体 35 滑杆全维度评估、AHP 加权计算、专家会诊审核</text>
    <text y="151" font-size="14" fill="#333">综合 DTSI 得分为 <tspan font-weight="bold" font-size="18" fill="#34d399">{{SCORE}}</tspan> 分</text>
    <text y="180" font-size="16" fill="#1a2845" font-weight="bold">达到 PDTMM <tspan fill="#34d399">L3 · 良好级</tspan> 认证标准</text>

    <text y="220" font-size="12" fill="#888">本证书表明该园区在数字化转型方面已达到 良好级 标准，可</text>
    <text y="238" font-size="12" fill="#888">作为 REITs 申报 / IPO 持续经营能力 / 政府数字化验收 的第三方独立证明。</text>
  </g>

  <!-- 印章 -->
  <g transform="translate(890, 540)">
    <circle r="60" fill="url(#sealGrad)" opacity="0.92"/>
    <circle r="54" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text text-anchor="middle" y="-10" font-size="13" fill="#fff" font-weight="bold">PARK-ROADS</text>
    <text text-anchor="middle" y="8" font-size="11" fill="#fff">认证专用章</text>
    <text text-anchor="middle" y="26" font-size="10" fill="#fff" opacity="0.85">CERTIFIED</text>
    <text text-anchor="middle" y="42" font-size="18" fill="#fff">★</text>
  </g>

  <!-- QR 码占位（防伪） -->
  <g transform="translate(80, 590)">
    <rect width="110" height="110" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <!-- QR 码占位图案 -->
    <g fill="#222">
      <rect x="8" y="8" width="22" height="22"/>
      <rect x="80" y="8" width="22" height="22"/>
      <rect x="8" y="80" width="22" height="22"/>
      <rect x="14" y="14" width="10" height="10" fill="#fff"/>
      <rect x="86" y="14" width="10" height="10" fill="#fff"/>
      <rect x="14" y="86" width="10" height="10" fill="#fff"/>
      <!-- 中间数据点 -->
      <rect x="38" y="14" width="4" height="4"/>
      <rect x="46" y="14" width="4" height="4"/>
      <rect x="54" y="14" width="4" height="4"/>
      <rect x="38" y="22" width="4" height="4"/>
      <rect x="54" y="22" width="4" height="4"/>
      <rect x="62" y="22" width="4" height="4"/>
      <rect x="38" y="30" width="4" height="4"/>
      <rect x="46" y="30" width="4" height="4"/>
      <rect x="38" y="38" width="4" height="4"/>
      <rect x="54" y="38" width="4" height="4"/>
      <rect x="70" y="38" width="4" height="4"/>
      <rect x="38" y="46" width="4" height="4"/>
      <rect x="46" y="46" width="4" height="4"/>
      <rect x="62" y="46" width="4" height="4"/>
      <rect x="70" y="46" width="4" height="4"/>
      <rect x="38" y="54" width="4" height="4"/>
      <rect x="54" y="54" width="4" height="4"/>
      <rect x="38" y="62" width="4" height="4"/>
      <rect x="46" y="62" width="4" height="4"/>
      <rect x="62" y="62" width="4" height="4"/>
      <rect x="70" y="62" width="4" height="4"/>
      <rect x="38" y="70" width="4" height="4"/>
      <rect x="54" y="70" width="4" height="4"/>
      <rect x="62" y="70" width="4" height="4"/>
      <rect x="38" y="78" width="4" height="4"/>
      <rect x="46" y="86" width="4" height="4"/>
      <rect x="54" y="86" width="4" height="4"/>
      <rect x="62" y="86" width="4" height="4"/>
      <rect x="70" y="86" width="4" height="4"/>
      <rect x="62" y="94" width="4" height="4"/>
    </g>
    <text x="55" y="130" text-anchor="middle" font-size="10" fill="#666">扫码验证证书真伪</text>
  </g>

  <!-- 区块链编号 + 元数据 -->
  <g transform="translate(220, 600)">
    <text font-size="11" fill="#666">认证编号：</text>
    <text x="80" font-size="13" fill="#222" font-weight="bold" font-family="Courier New, monospace">{{CERT_ID}}</text>
    <text y="22" font-size="11" fill="#666">区块链 Hash：</text>
    <text x="80" y="22" font-size="11" fill="#222" font-family="Courier New, monospace">{{BLOCKCHAIN_HASH}}</text>
    <text y="44" font-size="11" fill="#666">颁发日期：</text>
    <text x="80" y="44" font-size="11" fill="#222">{{ISSUE_DATE}}</text>
    <text y="66" font-size="11" fill="#666">有效期至：</text>
    <text x="80" y="66" font-size="11" fill="#222">{{EXPIRY_DATE}}</text>
    <text y="88" font-size="11" fill="#666">在线验证：</text>
    <text x="80" y="88" font-size="11" fill="#1a73e8">openflowone.hk/cert/{{CERT_ID}}</text>
  </g>

  <!-- 签名区 -->
  <g transform="translate(700, 600)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#222" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" font-size="11" fill="#666">认证机构签字</text>
    <text x="100" y="40" text-anchor="middle" font-size="14" fill="#222" font-weight="bold">Park-ROADS 认证委员会</text>
  </g>

  <!-- 底部信息 -->
  <g transform="translate(561.5, 745)">
    <text text-anchor="middle" font-size="10" fill="#888">本证书由 Park-ROADS 团队独立颁发 · 受 PDTMM 1.0 标准约束 · 区块链存证不可篡改</text>
    <text y="14" text-anchor="middle" font-size="9" fill="#aaa">Park-ROADS · openflowone.hk · © 2026 · 一次颁证 · 终身可查</text>
  </g>
</svg>