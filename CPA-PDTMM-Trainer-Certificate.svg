<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1123 794" font-family="-apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffef9"/><stop offset="100%" stop-color="#f8f6ed"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b"/><stop offset="50%" stop-color="#daa520"/><stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="medalGrad">
      <stop offset="0%" stop-color="#fed976"/><stop offset="50%" stop-color="#daa520"/><stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>
    <radialGradient id="sealGrad">
      <stop offset="0%" stop-color="#c0392b"/><stop offset="100%" stop-color="#8b0000"/>
    </radialGradient>
    <pattern id="watermark" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <text x="100" y="110" text-anchor="middle" font-size="28" fill="#000" opacity="0.03" transform="rotate(-30 100 100)" font-weight="bold">CPA-PDTMM · 认证评估师</text>
    </pattern>
    <filter id="shadow"><feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="3"/><feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1123" height="794" fill="url(#bgGrad)"/>
  <rect width="1123" height="794" fill="url(#watermark)"/>

  <rect x="30" y="30" width="1063" height="734" fill="none" stroke="url(#borderGrad)" stroke-width="5"/>
  <rect x="44" y="44" width="1035" height="706" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <g stroke="#daa520" stroke-width="2.5" fill="none">
    <path d="M 65 65 L 105 65 M 65 65 L 65 105"/>
    <path d="M 1058 65 L 1018 65 M 1058 65 L 1058 105"/>
    <path d="M 65 729 L 105 729 M 65 729 L 65 689"/>
    <path d="M 1058 729 L 1018 729 M 1058 729 L 1058 689"/>
  </g>

  <g transform="translate(561.5, 110)">
    <text text-anchor="middle" font-size="14" fill="#666" letter-spacing="4" font-weight="600">PARK-ROADS · CERTIFICATION COMMITTEE</text>
    <text y="32" text-anchor="middle" font-size="22" fill="#222" font-weight="bold" letter-spacing="8">CPA-PDTMM CERTIFICATION</text>
  </g>

  <g transform="translate(561.5, 200)">
    <text text-anchor="middle" font-size="40" fill="#1a2845" font-weight="bold">PDTMM 认证评估师资格证书</text>
    <text y="36" text-anchor="middle" font-size="14" fill="#666">Certified Professional Assessor of</text>
    <text y="54" text-anchor="middle" font-size="14" fill="#666">Park Digital Transformation Maturity Model</text>
  </g>

  <!-- 主奖章 -->
  <g transform="translate(180, 410)" filter="url(#shadow)">
    <circle r="85" fill="url(#medalGrad)"/>
    <circle r="76" fill="none" stroke="#8b6914" stroke-width="2"/>
    <circle r="55" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <text text-anchor="middle" y="-15" font-size="38" font-weight="bold" fill="#3d2900">CPA</text>
    <text text-anchor="middle" y="15" font-size="20" font-weight="bold" fill="#3d2900">PDTMM</text>
    <text text-anchor="middle" y="42" font-size="11" fill="#3d2900">CERTIFIED ASSESSOR</text>
    <!-- 缎带 -->
    <path d="M -40 80 L -30 130 L 0 110 L 30 130 L 40 80 Z" fill="#c0392b"/>
    <path d="M -30 130 L -30 145 L 0 130 L 0 110 Z" fill="#8b0000"/>
    <path d="M 30 130 L 30 145 L 0 130 L 0 110 Z" fill="#8b0000"/>
  </g>

  <g transform="translate(310, 350)">
    <text font-size="16" fill="#444">兹证明</text>
    <text y="42" font-size="32" fill="#1a2845" font-weight="bold">{{TRAINEE_NAME}}</text>
    <text y="62" font-size="11" fill="#888">（学员姓名占位符 · 颁证时填入）</text>

    <text y="105" font-size="14" fill="#333">已完成 PDTMM 认证评估师标准培训课程（5 天 · 40 学时）</text>
    <text y="128" font-size="14" fill="#333">并通过笔试与实操考核（综合得分 <tspan font-weight="bold" font-size="18" fill="#daa520">{{SCORE}}</tspan> 分），</text>
    <text y="151" font-size="14" fill="#333">具备独立承担 PDTMM 1.0 标准认证评估工作的专业资格。</text>

    <text y="195" font-size="13" fill="#222" font-weight="bold">授予 PDTMM 认证评估师资格 (CPA-PDTMM)</text>
    <text y="218" font-size="12" fill="#666">编号：<tspan font-family="Courier New" font-weight="bold" fill="#222">{{CERT_ID}}</tspan></text>
    <text y="240" font-size="12" fill="#666">区块链 Hash：<tspan font-family="Courier New" fill="#222" font-size="11">{{BLOCKCHAIN_HASH}}</tspan></text>
  </g>

  <!-- 印章 -->
  <g transform="translate(890, 540)">
    <circle r="62" fill="url(#sealGrad)" opacity="0.92"/>
    <circle r="55" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text text-anchor="middle" y="-12" font-size="13" fill="#fff" font-weight="bold">PARK-ROADS</text>
    <text text-anchor="middle" y="6" font-size="11" fill="#fff">认证委员会</text>
    <text text-anchor="middle" y="24" font-size="10" fill="#fff" opacity="0.85">CERT COMMITTEE</text>
    <text text-anchor="middle" y="42" font-size="18" fill="#fff">★</text>
  </g>

  <!-- QR -->
  <g transform="translate(85, 620)">
    <rect width="100" height="100" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <g fill="#222">
      <rect x="7" y="7" width="20" height="20"/>
      <rect x="73" y="7" width="20" height="20"/>
      <rect x="7" y="73" width="20" height="20"/>
      <rect x="12" y="12" width="10" height="10" fill="#fff"/>
      <rect x="78" y="12" width="10" height="10" fill="#fff"/>
      <rect x="12" y="78" width="10" height="10" fill="#fff"/>
      <rect x="35" y="12" width="4" height="4"/><rect x="43" y="12" width="4" height="4"/><rect x="51" y="12" width="4" height="4"/>
      <rect x="35" y="20" width="4" height="4"/><rect x="51" y="20" width="4" height="4"/><rect x="59" y="20" width="4" height="4"/>
      <rect x="35" y="28" width="4" height="4"/><rect x="43" y="28" width="4" height="4"/>
      <rect x="35" y="36" width="4" height="4"/><rect x="51" y="36" width="4" height="4"/><rect x="67" y="36" width="4" height="4"/>
      <rect x="35" y="44" width="4" height="4"/><rect x="43" y="44" width="4" height="4"/><rect x="59" y="44" width="4" height="4"/>
      <rect x="35" y="52" width="4" height="4"/><rect x="51" y="52" width="4" height="4"/>
      <rect x="35" y="60" width="4" height="4"/><rect x="43" y="60" width="4" height="4"/><rect x="59" y="60" width="4" height="4"/>
      <rect x="35" y="68" width="4" height="4"/>
      <rect x="43" y="80" width="4" height="4"/><rect x="51" y="80" width="4" height="4"/><rect x="59" y="80" width="4" height="4"/>
    </g>
    <text x="50" y="120" text-anchor="middle" font-size="10" fill="#666">扫码查询资格</text>
  </g>

  <!-- 元数据 -->
  <g transform="translate(220, 630)">
    <text font-size="11" fill="#666">颁证日期：</text>
    <text x="70" font-size="12" fill="#222" font-weight="bold">{{ISSUE_DATE}}</text>
    <text y="22" font-size="11" fill="#666">资格有效期：</text>
    <text x="70" y="22" font-size="12" fill="#222" font-weight="bold">3 年（至 {{EXPIRY_DATE}}）</text>
    <text y="44" font-size="11" fill="#666">继续教育：</text>
    <text x="70" y="44" font-size="12" fill="#222">每年 16 学时</text>
    <text y="66" font-size="11" fill="#666">在线验证：</text>
    <text x="70" y="66" font-size="11" fill="#1a73e8">openflowone.hk/trainer/{{CERT_ID}}</text>
  </g>

  <g transform="translate(700, 630)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#222" stroke-width="1"/>
    <text x="90" y="20" text-anchor="middle" font-size="11" fill="#666">认证委员会主席</text>
    <text x="90" y="40" text-anchor="middle" font-size="14" fill="#222" font-weight="bold">Park-ROADS 学术委员</text>
  </g>

  <g transform="translate(561.5, 753)">
    <text text-anchor="middle" font-size="10" fill="#888">本资格证书由 Park-ROADS 认证委员会独立颁发 · 区块链存证不可篡改 · 凭此资格可参与 PDTMM 1.0 正式认证项目</text>
    <text y="14" text-anchor="middle" font-size="9" fill="#aaa">Park-ROADS · openflowone.hk · © 2026 · CPA-PDTMM Trainer Certificate</text>
  </g>
</svg>